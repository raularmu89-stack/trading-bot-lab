<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Bot Dashboard</title>
  <style>
    :root {
      --bg:      #0d1117;
      --card:    #161b22;
      --border:  #30363d;
      --text:    #c9d1d9;
      --muted:   #8b949e;
      --green:   #3fb950;
      --red:     #f85149;
      --yellow:  #d29922;
      --blue:    #58a6ff;
      --purple:  #bc8cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
      font-size: 14px;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    header h1 { font-size: 16px; font-weight: 600; color: var(--blue); }
    .mode-badge {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      background: {% if use_real_data %}#1a3a1a{% else %}#2a1a00{% endif %};
      color: {% if use_real_data %}var(--green){% else %}var(--yellow){% endif %};
      border: 1px solid {% if use_real_data %}var(--green){% else %}var(--yellow){% endif %};
    }
    select, button {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: var(--border); }
    #last-update { color: var(--muted); font-size: 11px; margin-left: auto; }

    /* ── Layout ─────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: auto auto;
      gap: 12px;
      padding: 12px 16px;
      max-width: 1600px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
    }
    .card h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Ticker bar ─────────────────────────────── */
    #ticker-bar {
      display: flex;
      gap: 24px;
      align-items: center;
      padding: 8px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .ticker-price { font-size: 20px; font-weight: 700; }
    .ticker-label { color: var(--muted); font-size: 11px; }
    .ticker-val   { font-weight: 600; }
    .pos  { color: var(--green); }
    .neg  { color: var(--red); }
    .neu  { color: var(--text); }

    /* ── Chart ──────────────────────────────────── */
    #chart-card { grid-column: 1; grid-row: 1 / 3; }
    #chart-container {
      width: 100%;
      height: 420px;
      position: relative;
    }
    canvas#chart { width: 100%; height: 100%; display: block; }

    /* ── Regime card ────────────────────────────── */
    #regime-card { grid-column: 2; grid-row: 1; }
    .regime-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .regime-stat { display: flex; justify-content: space-between; margin: 4px 0; }
    .regime-stat .label { color: var(--muted); }

    /* ── Signals card ───────────────────────────── */
    #signals-card { grid-column: 2; grid-row: 2; }
    .signal-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .signal-row:last-child { border-bottom: none; }
    .strat-name { color: var(--muted); font-size: 12px; }
    .sig-badge {
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .sig-buy  { background: #1a3a1a; color: var(--green); border: 1px solid var(--green); }
    .sig-sell { background: #3a1a1a; color: var(--red);   border: 1px solid var(--red); }
    .sig-hold { background: #1c2128; color: var(--muted); border: 1px solid var(--border); }

    /* ── Loading ────────────────────────────────── */
    .loading { color: var(--muted); font-style: italic; }
    .error   { color: var(--red); }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      #chart-card, #regime-card, #signals-card { grid-column: 1; grid-row: auto; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <h1>📈 Trading Bot Dashboard</h1>
  <span class="mode-badge">{{ 'REAL — KuCoin' if use_real_data else 'DEMO — Simulado' }}</span>

  <label>Par:
    <select id="sel-symbol">
      {% for sym in symbols %}
      <option value="{{ sym }}" {{ 'selected' if sym == default_symbol else '' }}>{{ sym }}</option>
      {% endfor %}
    </select>
  </label>

  <label>Intervalo:
    <select id="sel-interval">
      {% for iv in ['1min','5min','15min','30min','1hour','4hour','1day'] %}
      <option value="{{ iv }}" {{ 'selected' if iv == default_interval else '' }}>{{ iv }}</option>
      {% endfor %}
    </select>
  </label>

  <button id="btn-refresh">↻ Actualizar</button>
  <span id="last-update"></span>
</header>

<!-- Ticker bar -->
<div id="ticker-bar">
  <div>
    <div class="ticker-label">PRECIO</div>
    <div class="ticker-price" id="tk-price">—</div>
  </div>
  <div>
    <div class="ticker-label">CAMBIO 24H</div>
    <div class="ticker-val" id="tk-change">—</div>
  </div>
  <div>
    <div class="ticker-label">MÁXIMO 24H</div>
    <div class="ticker-val" id="tk-high">—</div>
  </div>
  <div>
    <div class="ticker-label">MÍNIMO 24H</div>
    <div class="ticker-val" id="tk-low">—</div>
  </div>
  <div>
    <div class="ticker-label">VOLUMEN 24H</div>
    <div class="ticker-val" id="tk-vol">—</div>
  </div>
  <div>
    <div class="ticker-label">BID / ASK</div>
    <div class="ticker-val" id="tk-spread">—</div>
  </div>
</div>

<!-- Main grid -->
<div class="grid">

  <!-- Chart -->
  <div class="card" id="chart-card">
    <h2>Gráfico de Velas</h2>
    <div id="chart-container">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <!-- Regime -->
  <div class="card" id="regime-card">
    <h2>Régimen de Mercado</h2>
    <div id="regime-content" class="loading">Cargando…</div>
  </div>

  <!-- Signals -->
  <div class="card" id="signals-card">
    <h2>Señales Activas</h2>
    <div id="signals-content" class="loading">Cargando…</div>
  </div>

</div>

<script>
// ── Utilidades ──────────────────────────────────────────────────────────────

const $ = id => document.getElementById(id);
const fmt = (n, d=2) => n == null ? '—' : Number(n).toLocaleString('es-ES', {minimumFractionDigits:d, maximumFractionDigits:d});
const pct  = n => n == null ? '—' : (n >= 0 ? '+' : '') + fmt(n, 2) + '%';

function colorClass(val) {
  if (val == null) return 'neu';
  return val > 0 ? 'pos' : val < 0 ? 'neg' : 'neu';
}

const REGIME_COLORS = {
  strong_trend_bull:   '#3fb950',
  strong_trend_bear:   '#f85149',
  weak_trend_bull:     '#56d364',
  weak_trend_bear:     '#ff7b72',
  ranging:             '#58a6ff',
  breakout:            '#d29922',
  high_volatility:     '#bc8cff',
  mean_reversion_bull: '#39d353',
  mean_reversion_bear: '#da3633',
  insufficient_data:   '#8b949e',
};

// ── Gráfico de velas (canvas 2D simple) ────────────────────────────────────

class CandleChart {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx    = canvas.getContext('2d');
    this.data   = [];
    this.resize();
    window.addEventListener('resize', () => this.resize());
  }

  resize() {
    const c = this.canvas;
    const r = c.parentElement.getBoundingClientRect();
    c.width  = r.width  * (window.devicePixelRatio || 1);
    c.height = r.height * (window.devicePixelRatio || 1);
    c.style.width  = r.width  + 'px';
    c.style.height = r.height + 'px';
    this.ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
    this.w = r.width;
    this.h = r.height;
    if (this.data.length) this.draw();
  }

  load(candles) {
    this.data = candles;
    this.draw();
  }

  draw() {
    const { ctx, w, h, data } = this;
    if (!data.length) return;

    const PAD = { top: 20, bottom: 30, left: 10, right: 60 };
    const chartW = w - PAD.left - PAD.right;
    const chartH = h - PAD.top  - PAD.bottom;

    // Clear
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, w, h);

    const n = Math.min(data.length, 150);
    const slice = data.slice(-n);
    const allH  = slice.map(c => c.h);
    const allL  = slice.map(c => c.l);
    const maxP  = Math.max(...allH);
    const minP  = Math.min(...allL);
    const range = maxP - minP || 1;

    const xScale = d => PAD.left + (d / (n - 1)) * chartW;
    const yScale = p => PAD.top  + (1 - (p - minP) / range) * chartH;

    const cw = Math.max(2, chartW / n * 0.7);

    // Grid lines
    ctx.strokeStyle = '#21262d';
    ctx.lineWidth   = 0.5;
    for (let i = 0; i <= 4; i++) {
      const y = PAD.top + (i / 4) * chartH;
      ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(w - PAD.right, y); ctx.stroke();
      const p = maxP - (i / 4) * range;
      ctx.fillStyle = '#8b949e'; ctx.font = '10px monospace';
      ctx.fillText(fmt(p, 0), w - PAD.right + 4, y + 4);
    }

    // EMA20 line
    let ema = null, alpha = 2/21;
    ctx.beginPath(); ctx.strokeStyle = '#58a6ff88'; ctx.lineWidth = 1;
    slice.forEach((c, i) => {
      ema = ema == null ? c.c : alpha * c.c + (1 - alpha) * ema;
      const x = xScale(i); const y = yScale(ema);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Candles
    slice.forEach((c, i) => {
      const bull = c.c >= c.o;
      const col  = bull ? '#3fb950' : '#f85149';
      const x    = xScale(i);
      const yH   = yScale(c.h); const yL = yScale(c.l);
      const yO   = yScale(c.o); const yC = yScale(c.c);

      // Wick
      ctx.strokeStyle = col; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, yH); ctx.lineTo(x, yL); ctx.stroke();

      // Body
      ctx.fillStyle = bull ? '#1a3a1a' : '#3a1a1a';
      ctx.strokeStyle = col; ctx.lineWidth = 1;
      const top  = Math.min(yO, yC);
      const bodyH = Math.max(1, Math.abs(yO - yC));
      ctx.fillRect(x - cw/2, top, cw, bodyH);
      ctx.strokeRect(x - cw/2, top, cw, bodyH);
    });

    // Volume bars (bottom)
    const maxVol = Math.max(...slice.map(c => c.v));
    const volH   = 40;
    const volTop = h - PAD.bottom - volH;
    slice.forEach((c, i) => {
      const bull = c.c >= c.o;
      const x = xScale(i);
      const vh = (c.v / maxVol) * volH;
      ctx.fillStyle = bull ? '#1a3a1a' : '#3a1a1a';
      ctx.fillRect(x - cw/2, volTop + (volH - vh), cw, vh);
    });

    // X-axis labels (time)
    ctx.fillStyle = '#8b949e'; ctx.font = '10px monospace';
    const step = Math.max(1, Math.floor(n / 6));
    for (let i = 0; i < n; i += step) {
      const ts = new Date(slice[i].t);
      const label = ts.getUTCHours().toString().padStart(2,'0') + ':' +
                    ts.getUTCMinutes().toString().padStart(2,'0');
      ctx.fillText(label, xScale(i) - 14, h - 8);
    }
  }
}

// ── Estado ──────────────────────────────────────────────────────────────────

let chart;
let refreshTimer;

function getParams() {
  return {
    symbol:   $('sel-symbol').value,
    interval: $('sel-interval').value,
  };
}

// ── Carga de datos ──────────────────────────────────────────────────────────

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

async function loadTicker() {
  const { symbol } = getParams();
  try {
    const t = await fetchJSON(`/api/ticker?symbol=${symbol}`);
    $('tk-price').textContent  = fmt(t.price, t.price > 1000 ? 0 : 4);
    $('tk-price').className    = 'ticker-price ' + colorClass(t.change_pct);
    $('tk-change').innerHTML   = `<span class="${colorClass(t.change_pct)}">${pct(t.change_pct)}</span>`;
    $('tk-high').textContent   = fmt(t.high_24h, t.high_24h > 1000 ? 0 : 4);
    $('tk-low').textContent    = fmt(t.low_24h, t.low_24h > 1000 ? 0 : 4);
    $('tk-vol').textContent    = fmt(t.volume_24h, 0);
    $('tk-spread').textContent = fmt(t.bid, 2) + ' / ' + fmt(t.ask, 2);
  } catch (e) {
    console.warn('Ticker error:', e);
  }
}

async function loadOHLCV() {
  const { symbol, interval } = getParams();
  try {
    const data = await fetchJSON(`/api/ohlcv?symbol=${symbol}&interval=${interval}`);
    if (data.candles) chart.load(data.candles);
  } catch (e) {
    console.warn('OHLCV error:', e);
  }
}

async function loadRegime() {
  const { symbol, interval } = getParams();
  const el = $('regime-content');
  try {
    const r = await fetchJSON(`/api/regime?symbol=${symbol}&interval=${interval}`);
    const color = REGIME_COLORS[r.regime] || '#8b949e';
    el.innerHTML = `
      <div class="regime-badge" style="background:${color}22;color:${color};border:1px solid ${color}">
        ${r.regime_label || r.regime}
      </div>
      <div class="regime-stat"><span class="label">ADX</span><span>${fmt(r.adx, 1)}</span></div>
      <div class="regime-stat"><span class="label">ATR Ratio</span><span>${fmt(r.atr_ratio, 3)}</span></div>
      <div class="regime-stat"><span class="label">RSI</span><span>${fmt(r.rsi, 1)}</span></div>
      <div class="regime-stat"><span class="label">EMA Slope</span><span>${fmt(r.ema_slope, 5)}</span></div>
    `;
  } catch (e) {
    el.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  }
}

async function loadSignals() {
  const { symbol, interval } = getParams();
  const el = $('signals-content');
  try {
    const data = await fetchJSON(`/api/signals?symbol=${symbol}&interval=${interval}`);
    const sigs = data.signals || {};
    let html = '';
    for (const [name, info] of Object.entries(sigs)) {
      const sig   = info.signal;
      const cls   = sig === 'buy' ? 'sig-buy' : sig === 'sell' ? 'sig-sell' : 'sig-hold';
      const label = sig.toUpperCase();
      const extra = info.reason ? `<span style="color:#8b949e;font-size:11px">${info.reason}</span>` : '';
      html += `
        <div class="signal-row">
          <div>
            <div class="strat-name">${name.replace(/_/g,' ')}</div>
            ${extra}
          </div>
          <span class="sig-badge ${cls}">${label}</span>
        </div>`;
    }
    el.innerHTML = html || '<div class="loading">Sin señales</div>';
  } catch (e) {
    el.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  }
}

async function loadAll() {
  await Promise.all([loadOHLCV(), loadRegime(), loadSignals(), loadTicker()]);
  $('last-update').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-ES');
}

// ── Auto-refresh ─────────────────────────────────────────────────────────────

function startAutoRefresh(ms = 60000) {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(loadAll, ms);
}

// ── Init ─────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  chart = new CandleChart($('chart'));
  $('btn-refresh').addEventListener('click', loadAll);
  $('sel-symbol').addEventListener('change', loadAll);
  $('sel-interval').addEventListener('change', loadAll);
  loadAll();
  startAutoRefresh(60000);
});
</script>
</body>
</html>
